<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Import Library — Already Own?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #8b949e; margin-bottom: 32px; text-align: center; }
  #drop-zone {
    width: 100%;
    max-width: 440px;
    border: 2px dashed #30363d;
    border-radius: 14px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #drop-zone:hover, #drop-zone.over { border-color: #58a6ff; background: rgba(88,166,255,.06); }
  #drop-icon { font-size: 52px; margin-bottom: 18px; }
  #drop-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  #drop-sub { font-size: 12px; color: #8b949e; }
  #status { margin-top: 24px; font-size: 13px; font-weight: 600; min-height: 20px; text-align: center; }
  #status.ok  { color: #3fb950; }
  #status.err { color: #f85149; }
</style>
</head>
<body>
<h1>Import Library</h1>
<p class="sub">Select your JSON export file. This tab closes automatically after import.</p>
<div id="drop-zone">
  <div id="drop-icon">📂</div>
  <div id="drop-text">Click to choose a file</div>
  <div id="drop-sub">or drag and drop your .json export here</div>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div>
<div id="status"></div>
<script src="importer.js"></script>
</body>
</html>
